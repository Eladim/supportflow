services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: supportflow
      POSTGRES_PASSWORD: supportflow
      POSTGRES_DB: supportflow
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    ports:
      - "4000:4000"
    environment:
      NODE_ENV: development
      PORT: 4000
      DATABASE_URL: postgresql://supportflow:supportflow@postgres:5432/supportflow?schema=public
      JWT_ACCESS_SECRET: docker-dev-access-secret-min-32-characters-long
      JWT_REFRESH_SECRET: docker-dev-refresh-secret-min-32-characters-long
      CORS_ORIGIN: http://localhost:3000
      COOKIE_SECURE: "false"
      UPLOAD_DIR: /app/uploads
    volumes:
      - api_uploads:/app/uploads
    depends_on:
      - postgres

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:4000
        NEXT_PUBLIC_WS_URL: ws://localhost:4000
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
    depends_on:
      - api

volumes:
  pgdata:
  api_uploads:
